interface:
  display_name: "Omniverse USD Asset Validator"
  short_description: "Validate Stage 1 furniture and prop USD assets"
  default_prompt: "Use $omniverse-usd-asset-validator to validate this USD asset through `python omni_asset_cli.py validate --profile stage1-furniture` or `python omni_asset_cli.py validate-from-prompt`. Treat Stage 1 assets as static furniture, furnishings, and decorative props by default; use legacy static, collidable, or movable profiles only when the user explicitly asks for them. For rendered physics bbox evidence, use `physics-hit-test --render-frames --render-physics-bboxes` in Isaac Sim Docker so debug bbox curves stay in the runtime session layer."
